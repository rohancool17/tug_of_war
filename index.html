<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Tug of War: Team Dr. vs Team Hypertension</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        
        <!-- Screen 1: Login Screen -->
        <div id="login-screen" class="screen">
            <div class="login-form">
                <input type="text" id="employee-code" placeholder="Employee Code">
                <input type="password" id="password" placeholder="Password">
                <button id="login-button" class="btn-primary">Sign In</button>
            </div>
            <p id="login-error" class="error-msg hidden">Invalid credentials</p>
        </div>

        <!-- Screen 2: HCP Entry Screen -->
        <div id="hcp-screen" class="screen hidden">
            <div class="hcp-form">
                <input type="text" id="hcp-name" placeholder="HCP Name">
                <input type="text" id="hcp-code" placeholder="HCP Code">
                <button id="hcp-submit-button" class="btn-primary">Submit</button>
            </div>
        </div>

        <!-- Screen 3: Description Screen -->
        <div id="description-screen" class="screen hidden">
            <img src="assets/NEW NEXT BUTTON.png" id="desc-next-button" alt="Next" class="image-button next-btn">
        </div>

        <!-- Screen 4: Game Intro Screen -->
        <div id="intro-screen" class="screen hidden">
            <div class="intro-dynamic-text">
                <span id="intro-hcp-name"></span>
            </div>
            <div class="intro-instructions">
                <img src="assets/START TREATMENT.png" id="intro-start-button" alt="Start Treatment" class="image-button start-btn">
                <p>Press and hold all three buttons below simultaneously to pull!</p>
            </div>
        </div>

        <!-- Screen 5: Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div class="hud">
                <div class="score-bar">
                    <div id="progress-indicator"></div>
                </div>
            </div>
            
            <canvas id="game-canvas"></canvas>

            <div id="interaction-area">
                <div id="button-container">
                    <div class="button-wrapper">
                        <button id="btn-1" class="control-btn yellow-btn" aria-label="Mono therapy"></button>
                        <span class="btn-label">Mono therapy</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="btn-2" class="control-btn blue-btn" aria-label="Dual therapy"></button>
                        <span class="btn-label">Dual therapy</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="btn-3" class="control-btn orange-btn" aria-label="Triple therapy"></button>
                        <span class="btn-label">Triple therapy</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Screen 6: End Screen -->
        <div id="end-screen" class="screen hidden">
            <img src="assets/Play Again Button-06.png" id="restart-button" alt="Play Again" class="image-button restart-btn">
        </div>

    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
