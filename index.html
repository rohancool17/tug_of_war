<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Tug of War: Team Dr. vs Team Hypertension</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1 class="game-title">Tug of War</h1>
            <h2 class="game-subtitle"><span id="dr-label-header">Team Dr.</span> <span class="vs">vs</span> Team Hypertension</h2>
            
            <div class="name-entry">
                <input type="text" id="dr-name-input" placeholder="Enter Dr. Name" maxlength="20">
            </div>
            <div class="team-preview">
                <div class="team-card dr">
                    <span id="dr-label-card">Team Dr.</span>
                </div>
                <div class="team-card hypertension">
                    <span>High BP</span>
                </div>
            </div>
            <button id="start-button" class="btn-primary">Start Treatment</button>
            <p class="instructions">Press and hold all three buttons below simultaneously to pull!</p>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div class="hud">
                <div class="score-bar">
                    <div id="progress-indicator"></div>
                </div>
            </div>
            
            <canvas id="game-canvas"></canvas>

            <div id="interaction-area">
                <div id="button-container">
                    <div class="button-wrapper">
                        <button id="btn-1" class="control-btn yellow-btn" aria-label="Mono therapy"></button>
                        <span class="btn-label">Mono therapy</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="btn-2" class="control-btn blue-btn" aria-label="Dual therapy"></button>
                        <span class="btn-label">Dual therapy</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="btn-3" class="control-btn orange-btn" aria-label="Triple therapy"></button>
                        <span class="btn-label">Triple therapy</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="screen hidden">
            <h1 id="end-title">Result</h1>
            <p id="end-message"></p>
            <button id="restart-button" class="btn-secondary">Play Again</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
