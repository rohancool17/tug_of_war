<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Tug of War: Team Dr. vs Team Hypertension</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        
        <!-- Screen 2: HCP Entry Screen -->
        <div id="hcp-screen" class="screen">
            <div class="login-box">
                <div class="login-header">
                    <p>Enter the HCP information to begin</p>
                </div>

                <div class="input-group">
                    <label for="hcp-name">HCP Name</label>
                    <input type="text" id="hcp-name" placeholder="Enter HCP Name">
                </div>

                <div class="input-group">
                    <label for="hcp-code">HCP Code</label>
                    <input type="text" id="hcp-code" placeholder="Enter HCP Code">
                </div>

                <button id="hcp-submit-button" class="btn-primary login-btn-large">Submit</button>
            </div>
        </div>

        <!-- Screen 3: Description Screen -->
        <div id="description-screen" class="screen hidden">
            <button id="desc-next-button" class="image-button next-btn">
                <img src="/static/assets/NEW NEXT BUTTON.png" alt="Next">
            </button>
        </div>

        <!-- Screen 4: Game Intro Screen -->
        <div id="intro-screen" class="screen hidden">
            <div class="intro-dynamic-text">
                <span id="intro-hcp-name"></span>
            </div>
            <div class="intro-instructions">
                <button id="intro-start-button" class="image-button start-btn">
                    <img src="/static/assets/START TREATMENT.png" alt="Start Treatment">
                </button>
            </div>
        </div>

        <!-- Screen 5: Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div class="hud">
                <div class="score-bar">
                    <div id="progress-indicator"></div>
                </div>
            </div>
            
            <canvas id="game-canvas"></canvas>

            <div id="interaction-area">
                <div id="button-container">
                    <div class="button-wrapper">
                        <button id="btn-1" class="control-btn yellow-btn" aria-label="Mono therapy"></button>
                        <span class="btn-label">Mono therapy</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="btn-2" class="control-btn blue-btn" aria-label="Dual therapy"></button>
                        <span class="btn-label">Dual therapy</span>
                    </div>
                    <div class="button-wrapper">
                        <button id="btn-3" class="control-btn orange-btn" aria-label="Triple therapy"></button>
                        <span class="btn-label">Triple therapy</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Screen 6: End Screen -->
        <div id="end-screen" class="screen hidden">
            <div class="end-dynamic-text">
                <span id="end-hcp-name"></span>
            </div>
            <button id="restart-button" class="image-button restart-btn">
                <img src="/static/assets/Play Again Button-06.png" alt="Play Again">
            </button>
        </div>

    </div>

    <script type="module" src="/static/game.js?v=2.1"></script>
</body>
</html>
